<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XR Login</title>
  <meta name="description" content="تسجيل دخول إدارة متجر XR.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="center">
    <div class="card auth-box p24">
      <div class="row" style="justify-content:space-between">
        <button class="icon-btn" id="langToggle"></button>
        <button class="icon-btn" id="themeToggle"></button>
      </div>
      <h2 class="mt16" id="loginTitle"></h2>
      <p class="muted" id="loginHint"></p>
      <form id="loginForm" class="list mt16">
        <input id="userField" class="field" type="text" required>
        <input id="passField" class="field" type="password" required>
        <button id="loginBtn" class="btn btn-primary" type="submit"></button>
      </form>
    </div>
  </main>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
